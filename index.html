<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So Lengkap? - BOK Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#F0FDF4', 100: '#CCFBF1', 500: '#14B8A6', 600: '#0D9488', 700: '#0F766E', 800: '#115E59', 900: '#134E4A' },
                        accent: { 500: '#3B82F6', 600: '#2563EB' },
                        slate: { 850: '#151e2e' }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }

        .input-floating:focus + label, .input-floating:not(:placeholder-shown) + label { transform: translateY(-130%) scale(0.85); color: #0F766E; font-weight: 600; }
        .dark .input-floating:focus + label { color: #14B8A6; }

        @media print {
            @page { size: landscape; margin: 10mm; }
            body { background-color: white !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color: black !important; }
            .print\:hidden { display: none !important; }
            body.printing-tracking > div { display: none !important; }
            body.printing-tracking #printTrackingArea { display: block !important; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 h-screen flex overflow-hidden transition-colors duration-300">

    <div id="printTrackingArea" class="hidden w-full bg-white text-black p-4 absolute inset-0 z-[100] overflow-visible"></div>

    <aside id="mainSidebar" class="w-64 bg-white dark:bg-slate-850 border-r border-slate-200 dark:border-slate-800 flex-col justify-between hidden md:flex transition-all z-30 admin-only shadow-soft shrink-0">
        <div>
            <div class="h-20 flex items-center px-6 border-b border-slate-100 dark:border-slate-800">
                <div class="bg-gradient-to-br from-primary-500 to-primary-700 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-primary-500/30 mr-3 shrink-0">
                    <i class="fas fa-check-double text-xl"></i>
                </div>
                <h1 class="text-xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-primary-700 to-accent-600 dark:from-primary-400 dark:to-accent-400 tracking-tight truncate">So Lengkap?</h1>
            </div>
            
            <nav class="p-4 space-y-1.5 mt-2 overflow-y-auto">
                <p class="px-3 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Menu Utama</p>
                <button onclick="switchTab('dashboard')" id="btnTabDashboard" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold transition-all text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary-600 dark:hover:text-primary-400">
                    <i class="fas fa-chart-pie w-5"></i> Dashboard Publik
                </button>
                <button onclick="switchTab('data')" id="btnTabData" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold transition-all text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary-600 dark:hover:text-primary-400">
                    <i class="fas fa-edit w-5"></i> Input & Rekap SPJ
                </button>
                
                <p class="px-3 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mt-6 mb-2">Manajemen</p>
                <button onclick="switchTab('pegawai')" id="btnTabPegawai" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold transition-all text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary-600 dark:hover:text-primary-400">
                    <i class="fas fa-users-cog w-5"></i> Master Pegawai
                </button>
                <button onclick="changePassword()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold transition-all text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary-600 dark:hover:text-primary-400">
                    <i class="fas fa-key w-5"></i> Ubah Sandi Admin
                </button>
                <button onclick="switchTab('data'); setTimeout(()=>document.getElementById('backupPanel').scrollIntoView({behavior:'smooth'}), 100);" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold transition-all text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-primary-600 dark:hover:text-primary-400">
                    <i class="fas fa-database w-5"></i> Backup & Restore
                </button>
            </nav>
        </div>
        
        <div class="p-4 border-t border-slate-100 dark:border-slate-800">
            <div class="bg-primary-50 dark:bg-primary-900/20 p-4 rounded-2xl border border-primary-100 dark:border-primary-800/30 text-center">
                <p class="text-xs font-semibold text-primary-800 dark:text-primary-300 mb-2">Mode Akses: <span class="font-bold">ADMIN</span></p>
                <button onclick="toggleAdmin()" class="w-full bg-white dark:bg-slate-800 text-red-600 border border-red-100 dark:border-red-900/30 text-xs font-bold py-2 rounded-lg shadow-sm hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                    Logout Admin
                </button>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        
        <header class="h-20 glass-panel z-20 flex justify-between items-center px-6 print:hidden shrink-0 border-b border-slate-200 dark:border-slate-800">
            <div class="flex items-center gap-4">
                <div class="md:hidden bg-gradient-to-br from-primary-500 to-primary-700 text-white w-9 h-9 rounded-lg flex items-center justify-center shadow-md">
                    <i class="fas fa-check-double"></i>
                </div>
                <div>
                    <h2 class="text-lg font-bold text-slate-800 dark:text-white" id="greetingText">Selamat Datang!</h2>
                    <p class="text-xs font-medium text-slate-500 dark:text-slate-400" id="currentDate">Memuat tanggal...</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button id="themeToggle" onclick="toggleDarkMode()" class="w-10 h-10 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 flex items-center justify-center hover:text-primary-600 dark:hover:text-primary-400 transition-colors shadow-sm">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block"></i>
                </button>
                <button onclick="toggleAdmin()" id="btnLogin" class="public-only bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-4 py-2 rounded-full text-xs font-bold shadow-lg hover:shadow-xl transition-all flex items-center gap-2">
                    <i class="fas fa-lock"></i> Login Admin
                </button>
                <div class="admin-only hidden items-center gap-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 pl-2 pr-4 py-1.5 rounded-full shadow-sm">
                    <div class="w-7 h-7 rounded-full bg-primary-100 dark:bg-primary-900/50 text-primary-700 dark:text-primary-400 flex items-center justify-center text-xs font-bold">AD</div>
                    <span class="text-xs font-bold">Admin</span>
                </div>
            </div>
        </header>

        <datalist id="listProgramDef">
            <option value="Promkes"><option value="KIA-KB"><option value="Gizi / Stunting"><option value="Kesling"><option value="P2P (Penyakit)"><option value="Manajemen / Mutu"><option value="Posyandu Lansia"><option value="Kunjungan Rumah Risti">
        </datalist>

        <div class="flex-1 overflow-hidden relative">

            <main id="tabData" class="hidden absolute inset-0 overflow-y-auto p-4 sm:p-8 flex-col xl:flex-row gap-6 admin-only fade-in">
                <div class="w-full xl:w-[400px] shrink-0 space-y-6">
                    <div class="bg-white dark:bg-slate-850 rounded-3xl shadow-soft border border-slate-200 dark:border-slate-800 overflow-hidden">
                        <div class="p-6 border-b border-slate-100 dark:border-slate-800 bg-gradient-to-b from-slate-50 to-white dark:from-slate-800 dark:to-slate-850">
                            <h2 class="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
                                <div class="bg-primary-100 dark:bg-primary-900/50 text-primary-600 p-2 rounded-lg"><i class="fas fa-file-medical"></i></div> Input SPJ Baru
                            </h2>
                        </div>
                        
                        <div class="p-6">
                            <form id="checklistForm" class="space-y-5">
                                <div class="bg-primary-50 dark:bg-primary-900/10 border border-primary-100 dark:border-primary-800/30 rounded-xl p-3 flex items-center justify-between">
                                    <div class="flex items-center gap-2">
                                        <i class="fas fa-bolt text-primary-500"></i>
                                        <span class="text-xs font-bold text-primary-800 dark:text-primary-300">Mode Borongan</span>
                                    </div>
                                    <label class="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" id="retainForm" class="sr-only peer">
                                        <div class="w-9 h-5 bg-slate-200 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary-500"></div>
                                    </label>
                                </div>

                                <div class="space-y-4">
                                    <div class="relative">
                                        <label class="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1 block">Nama Pegawai</label>
                                        <select id="namaPegawai" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all dark:text-white">
                                            <option value="" disabled selected>Pilih Pegawai...</option>
                                        </select>
                                    </div>
                                    
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1 block">Tanggal</label>
                                            <input type="date" id="tanggal" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary-500 outline-none dark:text-white">
                                        </div>
                                        <div>
                                            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1 block
